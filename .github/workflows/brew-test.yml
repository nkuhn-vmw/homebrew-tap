name: brew-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: brew update
        run: brew update

      - name: Tap this repo locally as nkuhn-vmw/tap
        run: brew tap nkuhn-vmw/tap "$GITHUB_WORKSPACE"

      - name: brew style
        run: brew style nkuhn-vmw/tap/cfctx

      - name: brew audit (strict + online)
        run: brew audit --strict --online nkuhn-vmw/tap/cfctx

      - name: brew install (build from source)
        run: brew install --verbose --build-from-source nkuhn-vmw/tap/cfctx

      - name: brew test (sources cfctx.sh + runs cfctx version)
        run: brew test nkuhn-vmw/tap/cfctx
